<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 공유 캘린더</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E24B4A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="팀 캘린더">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
const firebaseConfig = {
  apiKey: "AIzaSyCwdQRsLvU7nPD7VacilCH6OypojQBOKF4",
  authDomain: "team-calendar-b52fa.firebaseapp.com",
  databaseURL: "https://team-calendar-b52fa-default-rtdb.firebaseio.com",
  projectId: "team-calendar-b52fa",
  storageBucket: "team-calendar-b52fa.firebasestorage.app",
  messagingSenderId: "974095358671",
  appId: "1:974095358671:web:8ecdc27650e75a38edb5ba"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const tasksRef = ref(db, 'tasks');
const attendRef = ref(db, 'attendance');
const etcRef = ref(db, 'etc');

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    window._currentUser = user;
    var uname = user.displayName || user.email;
    var uphoto = user.photoURL;
    var uiEl = document.getElementById('user-info');
    if (uiEl) uiEl.innerHTML =
      (uphoto ? '<img src="'+uphoto+'" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">' : '')
      + '<span style="font-size:12px;color:var(--t2)">'+uname+'</span>'
      + '<button onclick="doSignOut()" style="font-size:11px;padding:3px 9px;border:0.5px solid var(--bd);border-radius:6px;background:none;cursor:pointer;color:var(--t2)">로그아웃</button>';
    onValue(tasksRef, (snap) => {
      window._tasks = snap.val() ? Object.values(snap.val()) : [];
      if (window._renderAll) window._renderAll();
      window._showStatus('🟢 ' + uname);
    }, (err) => window._showStatus('🔴 오류: ' + err.message));
    onValue(attendRef, (snap) => {
      window._attendance = snap.val() ? Object.values(snap.val()) : [];
      if (window._renderAll) window._renderAll();
    });
    onValue(etcRef, (snap) => {
      window._etc = snap.val() ? Object.values(snap.val()) : [];
      if (window._renderAll) window._renderAll();
    });
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
    window._currentUser = null;
    window._showStatus('🔴 로그인 필요');
  }
});

window._fbSaveTasks  = async (list) => { const o={}; list.forEach(t=>{o[t.id]=t;}); await set(tasksRef,o); };
window._fbDelTask    = async (id)   => { await remove(ref(db,'tasks/'+id)); };
window._fbSaveAttend = async (list) => { const o={}; list.forEach(a=>{o[a.id]=a;}); await set(attendRef,o); };
window._fbDelAttend  = async (id)   => { await remove(ref(db,'attendance/'+id)); };
window._fbSaveEtc    = async (list) => { const o={}; list.forEach(e=>{o[e.id]=e;}); await set(etcRef,o); };
window._fbDelEtc     = async (id)   => { await remove(ref(db,'etc/'+id)); };
window._showStatus('🟡 로딩 중...');
window._doGoogleLogin = async () => { try { await signInWithPopup(auth, provider); } catch(e) { alert('로그인 실패: '+e.message); } };
window._doSignOut = async () => { await signOut(auth); };
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f8f7;color:#1a1a1a;font-size:14px;display:flex;height:100vh;overflow:hidden}
:root{
  --ca:#E24B4A;--ca-bg:#FCEBEB;--ca-t:#791F1F;
  --cb:#BA7517;--cb-bg:#FAEEDA;--cb-t:#633806;
  --cc:#378ADD;--cc-bg:#E6F1FB;--cc-t:#0C447C;
  --todo:#888780;--todo-bg:#F1EFE8;--todo-t:#444441;
  --prog:#1D9E75;--prog-bg:#E1F5EE;--prog-t:#085041;
  --done:#534AB7;--done-bg:#EEEDFE;--done-t:#3C3489;
  --hold:#D85A30;--hold-bg:#FAECE7;--hold-t:#712B13;
  --open:#D4537E;--open-bg:#FBEAF0;--open-t:#72243E;
  --ata:#1a6fc4;--ata-bg:#ddeeff;--ata-t:#0a3d7a;
  --ath:#2e8fd6;--ath-bg:#e4f2fb;--ath-t:#124e7a;
  --atq:#5ba8e0;--atq-bg:#eef6fd;--atq-t:#1e5c8a;
  --bd:#e5e4e0;--bg:#fff;--bg2:#f8f8f7;--bg3:#f1efe8;
  --t:#1a1a1a;--t2:#6b6a66;--t3:#9b9a96;--sw:220px;
}
/* Login */
#login-screen{position:fixed;inset:0;background:#f8f8f7;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column}
.login-card{background:#fff;border-radius:16px;border:0.5px solid var(--bd);padding:48px 40px;text-align:center;max-width:380px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.login-logo{font-size:36px;margin-bottom:16px}
.login-title{font-size:20px;font-weight:700;color:var(--t);margin-bottom:6px}
.login-desc{font-size:13px;color:var(--t2);margin-bottom:32px;line-height:1.6}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 20px;border-radius:10px;border:1.5px solid var(--bd);background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:var(--t);transition:background .15s;font-family:inherit}
.google-btn:hover{background:var(--bg2)}
.login-footer{font-size:11px;color:var(--t3);margin-top:20px}
#app-screen{display:none;width:100%;height:100vh}
/* Sidebar */
.sb{width:var(--sw);min-width:var(--sw);background:#f5f4f0;border-right:0.5px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;transition:width .2s,min-width .2s;flex-shrink:0;height:100%}
.sb.hide{width:0;min-width:0}
.sb-top{padding:13px;border-bottom:0.5px solid var(--bd)}
.sb-logo{font-size:13px;font-weight:700;color:var(--t);white-space:nowrap}
.sb-sec{padding:13px 13px 5px}
.sb-sec-title{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.7px;margin-bottom:7px;text-transform:uppercase}
.cal-row{display:flex;align-items:center;gap:7px;padding:4px 5px;border-radius:6px;cursor:pointer;margin-bottom:2px;white-space:nowrap}
.cal-row:hover{background:rgba(0,0,0,.05)}
.chk{width:14px;height:14px;border-radius:3px;border:1.5px solid #bbb;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chk.on-t{background:#E24B4A;border-color:#E24B4A}
.chk.on-a{background:#1a6fc4;border-color:#1a6fc4}
.chk.on-e{background:#888780;border-color:#888780}
.chk svg{width:9px;height:9px;fill:none;stroke:white;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;display:none}
.chk.on-t svg,.chk.on-a svg,.chk.on-e svg{display:block}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.clabel{font-size:13px;color:var(--t);font-weight:500}
.sb-div{height:0.5px;background:var(--bd);margin:8px 13px}
.mini{padding:9px 13px 13px}
.mini-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.mini-t{font-size:12px;font-weight:600;color:var(--t)}
.mnb{background:none;border:none;cursor:pointer;font-size:13px;color:var(--t2);padding:1px 5px;border-radius:4px}
.mnb:hover{background:rgba(0,0,0,.08)}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mdl{font-size:9px;color:var(--t3);text-align:center;padding:1px 0 3px;font-weight:500}
.mdl.sun{color:#E24B4A}
.md{font-size:10px;text-align:center;padding:3px 1px;border-radius:4px;cursor:pointer;color:var(--t);line-height:1}
.md:hover{background:rgba(0,0,0,.08)}
.md.today{background:#E24B4A;color:white;font-weight:700}
.md.om{color:var(--t3)}
.md.hol{color:#E24B4A}
.sb-grade{padding:10px 13px;border-top:0.5px solid var(--bd);margin-top:auto}
.sg-title{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.7px;text-transform:uppercase;margin-bottom:9px}
.sg-item{margin-bottom:8px}
.sg-badge{font-size:11px;font-weight:700;padding:1px 7px;border-radius:5px;display:inline-block;margin-bottom:3px}
.sg-sub{font-size:10px;color:var(--t2);line-height:1.5;padding-left:2px}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.stbar{background:#1a1a1a;color:#fff;font-size:11px;padding:4px 15px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.sdot{width:6px;height:6px;border-radius:50%;background:#888;flex-shrink:0}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 17px 8px;border-bottom:0.5px solid var(--bd);background:#fff;flex-shrink:0}
.hl{display:flex;align-items:center;gap:8px}
.sbtoggle{background:none;border:0.5px solid var(--bd);border-radius:6px;padding:4px 7px;cursor:pointer;color:var(--t2);display:flex;align-items:center}
.sbtoggle:hover{background:var(--bg2)}
.nav{display:flex;align-items:center;gap:6px}
.nb{background:none;border:0.5px solid var(--bd);border-radius:7px;padding:3px 9px;cursor:pointer;font-size:13px;color:var(--t)}
.nb:hover{background:var(--bg2)}
.mttl{font-size:16px;font-weight:600;min-width:108px;text-align:center;color:var(--t)}
.tdybtn{font-size:12px;padding:3px 9px;background:none;border:0.5px solid var(--bd);border-radius:7px;cursor:pointer;color:var(--t2)}
.hr{display:flex;align-items:center;gap:7px}
.vtog{display:flex;border:0.5px solid var(--bd);border-radius:7px;overflow:hidden}
.vb{background:none;border:none;padding:4px 8px;cursor:pointer;color:var(--t2);display:flex;align-items:center}
.vb:hover{background:var(--bg2)}
.vb.on{background:var(--bg2);color:var(--t)}
.vb svg{width:14px;height:14px;fill:currentColor}
.btn-task{background:#E24B4A;border:none;border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;color:white;font-weight:600}
.btn-task:hover{background:#c03030}
.btn-at{background:#1a6fc4;border:none;border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;color:white;font-weight:600}
.btn-at:hover{background:#145aa0}
.btn-etc{background:#888780;border:none;border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;color:white;font-weight:600}
.btn-etc:hover{background:#6b6a66}
.btn-dl{background:none;border:0.5px solid var(--bd);border-radius:7px;padding:5px 9px;font-size:12px;cursor:pointer;color:var(--t2);display:flex;align-items:center;gap:5px}
.btn-dl:hover{background:var(--bg2);color:var(--t)}
.btn-dl svg{width:14px;height:14px}
/* Stats bar */
.sbar{display:flex;gap:6px;padding:7px 17px;border-bottom:0.5px solid var(--bd);flex-wrap:wrap;align-items:center;background:#fff;flex-shrink:0}
.sbadge{font-size:11px;font-weight:600;padding:2px 6px;border-radius:7px}
.stotal{font-size:12px;font-weight:600;color:var(--t);cursor:pointer;text-decoration:underline;text-underline-offset:2px;text-decoration-color:var(--bd)}
.stotal:hover{color:var(--ca)}
.ssep{color:var(--bd);margin:0 1px}
.sitem{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--t2)}
.sitem-btn{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--t2);cursor:pointer;padding:2px 4px;border-radius:5px}
.sitem-btn:hover{background:var(--bg3)}
/* Calendar */
.calwrap{flex:1;overflow-y:auto;padding:0 15px 15px}
.dlabels{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;margin-top:9px}
.dlabel{text-align:center;font-size:11px;color:var(--t2);padding:2px 0 5px;font-weight:500}
.cgrid-wrap{position:relative}
.cgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--bd);border:0.5px solid var(--bd);border-radius:11px;overflow:hidden}
.cgrid-resizer{position:absolute;bottom:0;left:0;right:0;height:8px;cursor:ns-resize;z-index:10}
.cgrid-resizer::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:40px;height:3px;background:var(--bd);border-radius:2px;opacity:0;transition:opacity .2s}
.cgrid-resizer:hover::after{opacity:1}
.cgrid-resizer:hover{background:linear-gradient(to top,rgba(0,0,0,.04),transparent)}
.cell{background:#fff;min-height:var(--cell-h,180px);padding:4px 4px 3px;cursor:pointer;transition:background .1s;display:flex;flex-direction:column}
.cell:hover{background:var(--bg2)}
.cell.om{background:var(--bg3)}
.cell.om .dnum{color:var(--t3)}
.cell.tod .dnum{background:#E24B4A;color:white!important;border-radius:50%}
.cell.hol{background:#fff8f8}
.cell.hol .dnum{color:#E24B4A}
.drow{display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin-bottom:2px;min-height:22px}
.dnum{font-size:11px;font-weight:600;width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--t);flex-shrink:0}
.hname{font-size:9px;color:#E24B4A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58px}
.at-tag{display:inline-flex;align-items:center;font-size:9px;padding:1px 5px;border-radius:9px;cursor:pointer;white-space:nowrap;font-weight:600;line-height:1.5;flex-shrink:0;border:0.5px solid}
.at-tag:hover{filter:brightness(.9)}
.at-tag.annual{background:var(--ata-bg);color:var(--ata-t);border-color:var(--ata)}
.at-tag.half_am,.at-tag.half_pm{background:var(--ath-bg);color:var(--ath-t);border-color:var(--ath)}
.at-tag.quarter_am,.at-tag.quarter_pm{background:var(--atq-bg);color:var(--atq-t);border-color:var(--atq)}
.at-tag.birthday{background:#fce4f0;color:#8b1a4a;border-color:#e05a9a}
.chip{font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:1px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:2px;line-height:1.4}
.chip:hover{filter:brightness(.93)}
.cdsgn{font-size:8px;font-weight:700;flex-shrink:0;opacity:.9}
.cname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.omk{display:inline-flex;align-items:center;gap:2px;font-size:9px;padding:1px 4px 1px 3px;border-radius:8px;margin-bottom:1px;cursor:pointer;background:var(--open-bg);color:var(--open-t);border:0.5px solid var(--open);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.odot{width:6px;height:6px;border-radius:50%;background:var(--open);flex-shrink:0}
.more-btn{font-size:9px;color:var(--t2);padding:1px 5px;cursor:pointer;border-radius:4px;font-weight:600;background:var(--bg3);display:inline-block;margin-bottom:1px;border:0.5px solid var(--bd)}
.more-btn:hover{background:var(--bd)}
.etc-chip{font-size:9px;padding:1px 3px;border-radius:3px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t3);display:block;text-align:left;width:100%;border:none;background:none;font-family:inherit}
.etc-chip:hover{color:var(--t2);background:var(--bg3)}
.grade-A{background:var(--ca-bg);color:var(--ca-t)}
.grade-B{background:var(--cb-bg);color:var(--cb-t)}
.grade-C{background:var(--cc-bg);color:var(--cc-t)}
.status-todo{background:var(--todo-bg);color:var(--todo-t)}
.status-prog{background:var(--prog-bg);color:var(--prog-t)}
.status-done{background:var(--done-bg);color:var(--done-t)}
.status-hold{background:var(--hold-bg);color:var(--hold-t)}
.lbar{display:flex;gap:9px;padding:5px 17px;border-top:0.5px solid var(--bd);flex-wrap:wrap;align-items:center;background:#fff;flex-shrink:0}
.li{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--t2)}
.ld{width:7px;height:7px;border-radius:50%}
/* List */
.listwrap{flex:1;overflow-y:auto;padding:13px 17px}
.lfilt{display:flex;gap:6px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.fc{padding:3px 10px;border:0.5px solid var(--bd);border-radius:9px;cursor:pointer;font-size:12px;background:none;color:var(--t2)}
.fc:hover{background:var(--bg2)}
.fc.on{background:var(--bg2);color:var(--t);border-color:#888;font-weight:600}
.ltbl{width:100%;border-collapse:collapse;font-size:13px}
.ltbl th{font-size:11px;font-weight:600;color:var(--t2);text-align:left;padding:5px 8px;border-bottom:0.5px solid var(--bd);white-space:nowrap;background:var(--bg2);vertical-align:top}

.ltbl tr:last-child td{border-bottom:none}

.lbadge{font-size:11px;padding:2px 6px;border-radius:7px;font-weight:600;white-space:nowrap}
.empty{text-align:center;padding:32px 20px;color:var(--t3);font-size:13px}
.daycnt{margin-left:4px;font-size:11px;background:var(--bg2);color:var(--t3);padding:1px 5px;border-radius:6px;white-space:nowrap}
.col-filter-wrap{position:relative;display:inline-block}
.th-inner{display:flex;align-items:center;gap:4px;white-space:nowrap}
.filter-btn{background:none;border:none;cursor:pointer;padding:1px 3px;border-radius:3px;color:var(--t3);display:inline-flex;align-items:center;flex-shrink:0}

.filter-btn.active{color:#378ADD}
.filter-btn svg{width:11px;height:11px}
.filter-pop{position:absolute;top:100%;left:0;min-width:130px;background:#fff;border:0.5px solid #d0cfc9;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:500;padding:4px 0;display:none}
.filter-pop.open{display:block}
.filter-pop-item{padding:7px 13px;font-size:12px;cursor:pointer;color:var(--t);white-space:nowrap;display:flex;align-items:center;gap:7px}
.filter-pop-item:hover{background:var(--bg2)}
.filter-pop-item.on{color:#378ADD;font-weight:600}
.filter-pop-item.on::before{content:'✓';font-size:11px;width:12px;flex-shrink:0}
.filter-pop-item:not(.on)::before{content:'';width:12px;flex-shrink:0}
.th-wrap{position:relative}
/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.mod{background:#fff;border-radius:12px;border:0.5px solid var(--bd);width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.mhd{padding:12px 16px 10px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mttl2{font-size:15px;font-weight:600;color:var(--t)}
.mcls{background:none;border:none;cursor:pointer;font-size:20px;color:var(--t2);padding:1px 6px;border-radius:4px}
.mcls:hover{background:var(--bg2)}
.mbdy{padding:13px 16px}
.fr{margin-bottom:10px}
.fl{font-size:12px;color:var(--t2);margin-bottom:3px;display:block;font-weight:500}
.req{color:var(--ca)}
.fi,.fs,.fta{width:100%;padding:7px 9px;border:0.5px solid #d0cfc9;border-radius:7px;font-size:13px;font-family:inherit;background:#fff;color:var(--t)}
.fi:focus,.fs:focus,.fta:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.12)}
.fta{resize:vertical;min-height:52px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.tgrp{display:flex;gap:4px;flex-wrap:wrap}
.tbg{padding:5px 11px;border:0.5px solid #d0cfc9;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;background:#fff;color:var(--t2);transition:all .15s}
.tbg:hover{background:var(--bg2)}
.tbg.on-A{background:var(--ca-bg)!important;color:var(--ca-t)!important;border-color:var(--ca)!important}
.tbg.on-B{background:var(--cb-bg)!important;color:var(--cb-t)!important;border-color:var(--cb)!important}
.tbg.on-C{background:var(--cc-bg)!important;color:var(--cc-t)!important;border-color:var(--cc)!important}
.tbg.on-prog{background:var(--prog-bg)!important;color:var(--prog-t)!important;border-color:var(--prog)!important}
.tbg.on-done{background:var(--done-bg)!important;color:var(--done-t)!important;border-color:var(--done)!important}
.tbg.on-hold{background:var(--hold-bg)!important;color:var(--hold-t)!important;border-color:var(--hold)!important}
.tbg.on-at{background:var(--ata-bg)!important;color:var(--ata-t)!important;border-color:var(--ata)!important}
.mft{padding:10px 16px;border-top:0.5px solid var(--bd);display:flex;justify-content:flex-end;gap:6px;align-items:center}
.bcnl{background:none;border:0.5px solid #d0cfc9;border-radius:7px;padding:7px 14px;font-size:13px;cursor:pointer;color:var(--t2);font-weight:500}
.bcnl:hover{background:var(--bg2)}
.bsav{background:#E24B4A;border:none;border-radius:7px;padding:7px 14px;font-size:13px;cursor:pointer;color:white;font-weight:600}
.bsav:hover{background:#c03030}
.bsav.blue{background:#1a6fc4}.bsav.blue:hover{background:#145aa0}
.bsav.gray{background:#888780}.bsav.gray:hover{background:#6b6a66}
.bdel{background:none;border:1.5px solid var(--ca);border-radius:7px;padding:7px 12px;font-size:13px;cursor:pointer;color:var(--ca);font-weight:600;margin-right:auto}
.bdel:hover{background:var(--ca-bg)}
.delbox{background:#fff0f0;border:2px solid var(--ca);border-radius:7px;padding:14px;margin:0 16px 14px;display:none}
.deltit{font-size:14px;font-weight:700;color:var(--ca);margin-bottom:4px}
.deltit::before{content:"⚠️ "}
.deldsc{font-size:12px;color:var(--ca-t);margin-bottom:11px;line-height:1.5}
.delbtn{display:flex;gap:7px}
.bdelno{flex:1;background:#fff;border:1.5px solid #d0cfc9;border-radius:7px;padding:9px;font-size:13px;font-weight:500;cursor:pointer;color:var(--t2)}
.bdelno:hover{background:var(--bg2)}
.bdelyes{flex:2;background:var(--ca);border:none;border-radius:7px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;color:white}
.bdelyes:hover{background:#c03030}
.dbadges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.dbadge{font-size:11px;padding:2px 7px;border-radius:9px;font-weight:600}
.dr{display:flex;gap:5px;margin-bottom:6px;font-size:13px}
.dk{color:var(--t2);min-width:74px;font-size:12px;padding-top:1px}
.dv{color:var(--t)}
.dsb{display:flex;gap:4px;flex-wrap:wrap}
.dsbtn{padding:4px 10px;border:0.5px solid #d0cfc9;border-radius:9px;cursor:pointer;font-size:12px;background:#fff;color:var(--t2);font-weight:500}
.dsbtn.cur-prog{background:var(--prog-bg);color:var(--prog-t);border-color:var(--prog);font-weight:600}
.dsbtn.cur-done{background:var(--done-bg);color:var(--done-t);border-color:var(--done);font-weight:600}
.dsbtn.cur-hold{background:var(--hold-bg);color:var(--hold-t);border-color:var(--hold);font-weight:600}
/* Datepicker */
.dpw{position:relative}
.dpi{width:100%;padding:7px 9px;border:0.5px solid #d0cfc9;border-radius:7px;font-size:13px;background:#fff;color:var(--t);cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:inherit}
.dpi.empty{color:var(--t3)}
.dpi:hover{border-color:#888}
.dpp{position:absolute;top:calc(100% + 3px);left:0;z-index:999;background:#fff;border:0.5px solid #d0cfc9;border-radius:11px;padding:9px;width:232px;box-shadow:0 4px 16px rgba(0,0,0,.1);display:none}
.dpph{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.dppm{font-size:12px;font-weight:600;color:var(--t)}
.dpnb{background:none;border:0.5px solid #d0cfc9;border-radius:5px;padding:2px 7px;cursor:pointer;font-size:11px;color:var(--t2)}
.dpnb:hover{background:var(--bg2)}
.dpg{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.dpdl{font-size:9px;color:var(--t3);text-align:center;padding:2px 0 4px;font-weight:500}
.dpdl.sun{color:#E24B4A}
.dpd{font-size:11px;padding:4px 1px;text-align:center;border-radius:4px;cursor:pointer;color:var(--t);border:none;background:none;font-family:inherit;width:100%}
.dpd:hover{background:var(--bg2)}
.dpd.sel{background:#E24B4A;color:white;font-weight:600}
.dpd.tod{border:1px solid #E24B4A;color:#E24B4A}
.dpd.tod.sel{color:white;border-color:transparent}
.dpd.om{color:var(--t3)}
.dpd.hol{color:#E24B4A;opacity:.45;pointer-events:none}
.dpd.we{color:#aaa;opacity:.45;pointer-events:none}
.dpclr{font-size:10px;color:var(--t3);cursor:pointer;padding:5px 0 1px;text-align:center;border-top:0.5px solid var(--bd);margin-top:5px}
.dpclr:hover{color:var(--ca)}
/* Multiselect (업무종류/담당자) */
.ms-wrap{display:flex;flex-wrap:wrap;gap:5px;padding:6px 8px;border:0.5px solid #d0cfc9;border-radius:7px;min-height:38px;cursor:pointer;background:#fff}
.ms-wrap:focus-within{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.12)}
.ms-tag{display:inline-flex;align-items:center;gap:4px;border-radius:5px;font-size:12px;padding:2px 6px;font-weight:600}
.ms-tag.type-tag{background:var(--cc-bg);color:var(--cc-t);border:0.5px solid var(--cc)}
.ms-tag.designer-tag{background:var(--prog-bg);color:var(--prog-t);border:0.5px solid var(--prog)}
.ms-tag-del{cursor:pointer;font-size:13px;line-height:1;opacity:.7}
.ms-tag-del:hover{opacity:1}
.ms-placeholder{font-size:13px;color:var(--t3);line-height:1.8}
.ms-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:0.5px solid #d0cfc9;border-radius:7px;box-shadow:0 4px 14px rgba(0,0,0,.1);z-index:500;max-height:200px;overflow-y:auto;margin-top:2px;display:none}
.ms-option{padding:8px 10px;font-size:13px;cursor:pointer;color:var(--t);border-bottom:0.5px solid var(--bd);display:flex;align-items:center;gap:8px}
.ms-option:last-child{border-bottom:none}
.ms-option:hover{background:var(--bg2)}
.ms-option.selected{background:var(--cc-bg);color:var(--cc-t)}
.ms-option.selected.designer{background:var(--prog-bg);color:var(--prog-t)}
.ms-check{width:14px;height:14px;border-radius:3px;border:1.5px solid #bbb;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ms-check.on{background:var(--cc);border-color:var(--cc)}
.ms-check.on.designer{background:var(--prog);border-color:var(--prog)}
.ms-check.on::after{content:'';display:block;width:8px;height:6px;border-left:2px solid white;border-bottom:2px solid white;transform:rotate(-45deg) translate(1px,-1px)}
.ms-done-btn{font-size:12px;padding:7px 10px;display:flex;justify-content:flex-end;border-top:0.5px solid var(--bd)}
/* Autocomplete */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:0.5px solid #d0cfc9;border-radius:7px;box-shadow:0 4px 14px rgba(0,0,0,.1);z-index:500;max-height:180px;overflow-y:auto;margin-top:2px;display:none}
.ac-item{padding:8px 10px;font-size:13px;cursor:pointer;color:var(--t);border-bottom:0.5px solid var(--bd)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--bg2)}
.ac-item em{color:var(--ca);font-style:normal;font-weight:600}
/* More popup */
.more-item{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:0.5px solid var(--bd);cursor:pointer}
.more-item:last-child{border-bottom:none}
.more-item:hover{background:var(--bg2)}
/* lmtbl */
.lmtbl{width:100%;border-collapse:collapse;font-size:13px}
.lmtbl th{font-size:11px;font-weight:600;color:var(--t2);text-align:left;padding:6px 8px;border-bottom:0.5px solid var(--bd);white-space:nowrap;background:var(--bg2)}
.lmtbl td{padding:6px 8px;border-bottom:0.5px solid var(--bd);vertical-align:middle;white-space:nowrap}
.lmtbl tr:last-child td{border-bottom:none}
.lmtbl tr:hover td{background:var(--bg2);cursor:pointer}
/* Toast */
.toast{position:fixed;bottom:14px;right:14px;background:#1a1a1a;color:#fff;font-size:12px;padding:6px 13px;border-radius:18px;opacity:0;transition:opacity .3s;z-index:400;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>

var SMAP={prog:'진행중',done:'완료',hold:'대응'};
var GMAP={A:'A급',B:'B급',C:'C급'};

function hol(ds){return HOLS[ds]||HOLS[ds.slice(5)]||null;}
function tds(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function p2(n){return String(n).padStart(2,'0');}
function dlabel(n){
  if(!n) return '';
  var names = n.split(', ').map(function(s){return s.trim();}).filter(Boolean);
  if(names.length === 0) return '';
  // 전체 선택 여부 확인
  var allMatch = DESIGNERS.every(function(d){ return names.indexOf(d) >= 0; });
  if(allMatch) return 'ALL';
  // 각 이름의 첫 글자 합치기
  return names.map(function(s){ return s.slice(0,1); }).join('');
}
function isWE(d){var w=d.getDay();return w===0||w===6;}
function gid(){return Date.now()+Math.random().toString(36).slice(2);}
function bizDays(s,e){
  if(!s||!e)return 0;
  var sd=new Date(s+'T00:00:00'),ed=new Date(e+'T00:00:00');
  if(sd>ed)return 0;
  var cnt=0,cur=new Date(sd);
  while(cur<=ed){if(cur.getDay()!==0&&cur.getDay()!==6&&!hol(tds(cur)))cnt++;cur.setDate(cur.getDate()+1);}
  return cnt;
}

function getMonthTasks(){
  return tasks.filter(function(t){
    if(!t.startDate||!t.endDate)return false;
    var s=new Date(t.startDate+'T00:00:00'),e=new Date(t.endDate+'T00:00:00');
    return s<=new Date(CY,CM+1,0)&&e>=new Date(CY,CM,1);
  });
}
function getMonthTasksUniq(){
  var all=getMonthTasks(),map={};
  for(var i=0;i<all.length;i++){
    var t=all[i],key=(t.taskName||'').trim();
    if(!map[key]){
      map[key]={id:t.id,taskName:t.taskName,taskType:t.taskType||'',taskTypes:t.taskTypes||[],
        dept:t.dept,customDept:t.customDept,grade:t.grade,designer:t.designer,designers:t.designers||[],
        status:t.status,draftDate:t.draftDate,openDate:t.openDate,memo:t.memo,
        startDate:t.startDate,endDate:t.endDate,totalBizDays:bizDays(t.startDate,t.endDate)};
    } else {
      var m=map[key];
      if(t.startDate&&(!m.startDate||t.startDate<m.startDate))m.startDate=t.startDate;
      if(t.endDate&&(!m.endDate||t.endDate>m.endDate))m.endDate=t.endDate;
      m.totalBizDays=(m.totalBizDays||0)+bizDays(t.startDate,t.endDate);
    }
  }
  return Object.values(map);
}
function getMonthAttend(){
  var pfx=CY+'-'+p2(CM+1);
  return attendance.filter(function(a){return a.date&&a.date.indexOf(pfx)===0;});
}

  else if(filter.indexOf('status-')===0){var s=filter.replace('status-','');filtered=mt.filter(function(t){return t.status===s;});}

      }
      var t=item,dl=t.dept==='기타'&&t.customDept?t.customDept:t.dept,bd=bizDays(t.startDate,t.endDate);
      return '<tr onclick="closeMod();setTimeout(function(){openDetail(\''+t.id+'\',null);},60)">'

    +'<div style="overflow-x:auto;max-height:68vh;padding-bottom:16px"><table class="lmtbl"><thead><tr>'

function renderMiniCal(){
  document.getElementById('mini-title').textContent=CY+'년 '+(CM+1)+'월';
  var ts=tds(new Date()),fdow=new Date(CY,CM,1).getDay(),dim=new Date(CY,CM+1,0).getDate();
  var days=['일','월','화','수','목','금','토'];
  var html=days.map(function(d,i){return '<div class="mdl'+(i===0?' sun':'')+'">'+d+'</div>';}).join('');
  for(var i=0;i<fdow;i++)html+='<div class="md om"></div>';
  for(var d=1;d<=dim;d++){
    var ds=tds(new Date(CY,CM,d)),isT=ds===ts,isH=!!hol(ds);
    html+='<div class="md'+(isT?' today':'')+(isH&&!isT?' hol':'')+'" onclick="goDate('+CY+','+CM+','+d+')">'+d+'</div>';
  }
  document.getElementById('mini-grid').innerHTML=html;
}

function renderCal(){
  var grid=document.getElementById('cgrid');
  var ts=tds(new Date());
  var start=new Date(CY,CM,1),dow=start.getDay();
  start.setDate(start.getDate()+(dow===0?-6:-(dow-1)));
  var end=new Date(CY,CM+1,0);
  while(end.getDay()!==5)end.setDate(end.getDate()+1);
  var cells=[],cur=new Date(start);
  while(cur<=end){
    if(cur.getDay()!==0&&cur.getDay()!==6){
      var ds=tds(cur),hn=hol(ds);
      cells.push({date:new Date(cur),ds:ds,om:cur.getMonth()!==CM,tod:ds===ts,hn:hn});
    }
    cur.setDate(cur.getDate()+1);
  }
  var html='';
  for(var i=0;i<cells.length;i++){
    var cell=cells[i],date=cell.date,ds=cell.ds,om=cell.om,tod=cell.tod,hn=cell.hn;
    var cls='cell'+(om?' om':'')+(tod?' tod':'')+(hn?' hol':'');
    var atTags='';
    if(showAttend&&!hn){
      for(var ai=0;ai<attendance.length;ai++){
        var a=attendance[ai];
        if(a.date===ds){
          var sh=AT_SHORT[a.atType]||'',ac=a.atType||'annual';
          atTags+='<span class="at-tag '+ac+'" onclick="openDetailAttend(\''+a.id+'\',event)">'+(a.name||'?')+' '+sh+'</span>';
        }
      }
    }
    var allItems=[];
    if(showTask&&!hn){
      var dDate=new Date(date.getFullYear(),date.getMonth(),date.getDate());
      for(var ti=0;ti<tasks.length;ti++){
        var t=tasks[ti];
        if(t.openDate===ds)allItems.push({type:'o',t:t});
      }
      for(var ti2=0;ti2<tasks.length;ti2++){
        var t2=tasks[ti2];
        if(!t2.startDate||!t2.endDate)continue;
        var s2=new Date(t2.startDate+'T00:00:00'),e2=new Date(t2.endDate+'T00:00:00');
        if(dDate>=s2&&dDate<=e2)allItems.push({type:'p',t:t2});
      }
    }
    var chips='';
    var cellH=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-h'))||180;
    var MAX_SHOW=Math.max(1,Math.floor((cellH-34)/18));
    for(var ci=0;ci<Math.min(MAX_SHOW,allItems.length);ci++){
      var item=allItems[ci];
      if(item.type==='o'){
        var lbl=dlabel(item.t.designer);
        chips+='<div class="omk" onclick="openDetail(\''+item.t.id+'\',event)"><span class="odot"></span>'+(lbl?lbl+' · ':'')+(item.t.taskName||'오픈')+'</div>';
      } else {
        var lbl2=dlabel(item.t.designer);
        chips+='<div class="chip status-'+item.t.status+'" onclick="openDetail(\''+item.t.id+'\',event)">'+(lbl2?'<span class="cdsgn">'+lbl2+'</span>':'')+'<span class="cname">'+(item.t.taskName||'(업무명)')+'</span></div>';
      }
    }
    if(allItems.length>MAX_SHOW){
      var remain=allItems.length-MAX_SHOW;
      var allIds=allItems.map(function(it){return it.t.id;}).join(',');
      chips+='<div class="more-btn" onclick="showMoreTasks(\''+ds+'\',\''+allIds+'\')">+'+remain+'건 더 보기</div>';
    }
    var etcHtml='';
    if(showEtc&&!hn){
      for(var ei=0;ei<etc.length;ei++){
        if(etc[ei].date===ds){
          etcHtml+='<div class="etc-chip" onclick="openDetailEtc(\''+etc[ei].id+'\',event)">'+(etc[ei].title||'기타')+'</div>';
        }
      }
    }
    var dblclick=hn?'':'openAdd(\''+ds+'\')';
    html+='<div class="'+cls+'" ondblclick="'+dblclick+'">'
      +'<div class="drow"><span class="dnum">'+date.getDate()+'</span>'
      +(hn?'<span class="hname">'+hn+'</span>':atTags)
      +'</div>'
      +'<div style="flex:1">'
      +(hn?'<div style="font-size:9px;color:#E24B4A;opacity:.6;padding:1px 2px">휴일</div>':chips)
      +'</div>'
      +(etcHtml?'<div style="border-top:0.5px dashed var(--bd);padding-top:2px;margin-top:auto">'+etcHtml+'</div>':'')
      +'</div>';
  }
  grid.innerHTML=html;
}

(function(){
  var isResizing=false,startY=0,startH=180;
  function getCellH(){return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-h'))||180;}
  function setCellH(h){h=Math.max(80,Math.min(400,h));document.documentElement.style.setProperty('--cell-h',h+'px');if(typeof renderCal==='function')renderCal();}
  function init(){
    var r=document.getElementById('cgrid-resizer');if(!r)return;
    r.addEventListener('mousedown',function(e){isResizing=true;startY=e.clientY;startH=getCellH();document.body.style.cursor='ns-resize';document.body.style.userSelect='none';e.preventDefault();});
    document.addEventListener('mousemove',function(e){if(!isResizing)return;setCellH(startH+(e.clientY-startY));});
    document.addEventListener('mouseup',function(){if(isResizing){isResizing=false;document.body.style.cursor='';document.body.style.userSelect='';}});
  }
  setTimeout(init,200);
})();

function makePicker(id,label,val,inclWE){
  return '<div class="dpw" id="dpw-'+id+'">'

    +'<button type="button" class="dpi'+(val?'':' empty')+'" onclick="togglePicker(\''+id+'\','+(inclWE?'true':'false')+')">'

    +'<div class="dpp" id="dpp-'+id+'"></div></div>';

function togglePicker(id,inclWE){
  var pop=document.getElementById('dpp-'+id);if(!pop)return;
  var isOpen=pop.style.display==='block';
  document.querySelectorAll('.dpp').forEach(function(p){p.style.display='none';});
  if(!isOpen){var v=document.getElementById('dph-'+id).value,pY=CY,pM=CM;
    if(v){var d2=new Date(v+'T00:00:00');pY=d2.getFullYear();pM=d2.getMonth();}
    renderPP(id,pY,pM,inclWE);pop.style.display='block';activePicker={id:id,inclWE:inclWE};}
  else activePicker=null;
}
function renderPP(id,pY,pM,inclWE){
  var pop=document.getElementById('dpp-'+id);if(!pop)return;
  var sel=document.getElementById('dph-'+id).value,ts=tds(new Date());
  var fdow=new Date(pY,pM,1).getDay(),dim=new Date(pY,pM+1,0).getDate();
  var days=['일','월','화','수','목','금','토'];
  var g=days.map(function(d,i){return '<div class="dpdl'+(i===0?' sun':'')+'">'+d+'</div>';}).join('');
  for(var i=0;i<fdow;i++)g+='<div class="dpd om"></div>';
  for(var d=1;d<=dim;d++){
    var dt=new Date(pY,pM,d),ds=tds(dt),isH=!!hol(ds),isWe=isWE(dt),isSel=ds===sel,isTod=ds===ts;
    var cls2='dpd'+(isTod?' tod':'')+(isSel?' sel':'')+(isH?' hol':'')+((!inclWE&&isWe&&!isH)?' we':'');
    var act=(isH||(!inclWE&&isWe))?'':'onclick="pickDate(\''+id+'\',\''+ds+'\')"';
    g+='<button type="button" class="'+cls2+'" '+act+'>'+d+'</button>';
  }
  pop.innerHTML='<div class="dpph">'
    +'<button class="dpnb" onclick="pickerNav(\''+id+'\','+pY+','+pM+',-1,'+inclWE+')">&#8249;</button>'
    +'<span class="dppm">'+pY+'년 '+(pM+1)+'월</span>'
    +'<button class="dpnb" onclick="pickerNav(\''+id+'\','+pY+','+pM+',1,'+inclWE+')">&#8250;</button>'
    +'</div><div class="dpg">'+g+'</div>'
    +'<div class="dpclr" onclick="pickDate(\''+id+'\',\'\')">지우기</div>';
}
function pickerNav(id,y,m,dir,inclWE){m+=dir;if(m>11){m=0;y++;}if(m<0){m=11;y--;}renderPP(id,y,m,inclWE);}
function pickDate(id,ds){
  document.getElementById('dph-'+id).value=ds;
  document.getElementById('dpv-'+id).textContent=ds||'날짜 선택';
  var btn=document.querySelector('#dpw-'+id+' .dpi');
  if(btn)btn.className='dpi'+(ds?'':' empty');
  document.getElementById('dpp-'+id).style.display='none';activePicker=null;
}

  if(dd)dd.innerHTML=items.map(function(v){
    var sel=selArr.indexOf(v)>=0;

function exportExcel(){
  if(typeof ExcelJS==='undefined'){showToast('라이브러리 로딩 중... 잠시 후 다시 시도해주세요');return;}
  var btn=document.querySelector('.btn-dl');
  if(btn){btn.innerHTML='⏳ 생성중...';btn.disabled=true;}
  var exportTasks=tasks.filter(function(t){return t.startDate&&t.endDate;});
  var BLACK='FF000000',WHITE='FFFFFFFF';
  function fnt(bold,sz,argb){return{name:'맑은 고딕',bold:!!bold,size:sz||10,color:{argb:argb||'FF000000'}};}
  function fill(hex6){return{type:'pattern',pattern:'solid',fgColor:{argb:'FF'+hex6}};}
  function alg(h,v,wrap){return{horizontal:h||'left',vertical:v||'middle',wrapText:wrap!==false};}
  var thinL={style:'thin',color:{argb:'FFBBBBBB'}},hairL={style:'hair',color:{argb:'FFAAAAAA'}},medL={style:'medium',color:{argb:'FF000000'}};
  function ib(){return{left:thinL,right:thinL,top:hairL,bottom:hairL};}
  function hb(){return{left:thinL,right:thinL,top:medL,bottom:medL};}
  function applyOuter(ws,r1,c1,r2,c2){
    for(var r=r1;r<=r2;r++)for(var c=c1;c<=c2;c++){
      var cell=ws.getCell(r,c),b=cell.border?JSON.parse(JSON.stringify(cell.border)):{};
      if(r===r1)b.top=medL;if(r===r2)b.bottom=medL;if(c===c1)b.left=medL;if(c===c2)b.right=medL;
      cell.border=b;
    }
  }
  var wb=new ExcelJS.Workbook();wb.creator='팀 캘린더';
  var months={};
  exportTasks.forEach(function(t){var ym=t.startDate.slice(0,7);months[ym]=months[ym]||[];months[ym].push(t);});
  var sortedYMs=Object.keys(months).sort();
  // 시트1
  var ws1=wb.addWorksheet('업무목록',{views:[{state:'frozen',xSplit:0,ySplit:1,showGridLines:false}]});
  ws1.properties.defaultRowHeight=18;
  var H1=['등급','업무종류','업무명','요청부서','담당자','기안일','시작일','종료일','영업일','진행상황','메모'];
  var W1=[6,14,32,14,9,11,11,11,8,10,26];
  ws1.columns=H1.map(function(h,i){return{header:'',key:'c'+(i+1),width:W1[i]};});
  var hRow=ws1.getRow(1);hRow.height=22;
  H1.forEach(function(h,i){var c=hRow.getCell(i+1);c.value=h;c.font=fnt(true,10,'FFFFFFFF');c.fill=fill('000000');c.alignment=alg('center');c.border=hb();});
  ws1.auto_filter={from:'A1',to:'K1'};
  var ri=2;
  sortedYMs.forEach(function(ym){
    var mRow=ws1.getRow(ri);mRow.height=18;
    var mc=mRow.getCell(1);mc.value=ym.replace('-','년 ')+'월';mc.font=fnt(true,10,'FF1A3A5C');mc.fill=fill('D6E4F0');mc.alignment=alg('left');mc.border={left:medL,right:thinL,top:medL,bottom:thinL};
    for(var c=2;c<=11;c++){var cc=mRow.getCell(c);cc.fill=fill('D6E4F0');cc.border={left:thinL,right:(c===11?medL:thinL),top:medL,bottom:thinL};}
    ws1.mergeCells(ri,1,ri,11);ri++;
    months[ym].slice().sort(function(a,b){return a.startDate>b.startDate?1:-1;}).forEach(function(t){
      var dl=(t.dept==='기타'&&t.customDept)?t.customDept:(t.dept||'');
      var gc=t.grade==='A'?'FADADB':t.grade==='B'?'FEF3D0':t.grade==='C'?'D6EAF8':'FFFFFF';
      var sc=t.status==='prog'?'D6EAF8':t.status==='done'?'D5F5E3':t.status==='hold'?'FDEBD0':'FFFFFF';
      var bd2=bizDays(t.startDate,t.endDate);
      var SMAP2={prog:'진행중',done:'완료',hold:'대응'};
      var row=[t.grade||'',t.taskType||'',t.taskName||'',dl,t.designer||'',t.draftDate||'',t.startDate||'',t.endDate||'',bd2,SMAP2[t.status]||t.status||'',t.memo||''];
      var dRow=ws1.getRow(ri);
      row.forEach(function(val,ci){
        var cell=dRow.getCell(ci+1);cell.value=val;cell.font=fnt(ci===0);
        cell.alignment=alg([0,1,3,4,5,6,7,8,9].indexOf(ci)>=0?'center':'left');cell.border=ib();
        cell.fill=ci===0?fill(gc):ci===9?fill(sc):fill('FFFFFF');
      });ri++;
    });
  });
  applyOuter(ws1,1,1,ri-1,11);ws1.freeze_panes='A2';
  // 시트2
  var ws2=wb.addWorksheet('월별통계',{views:[{showGridLines:false}]});
  var H2=['월','전체','A','A%','B','B%','C','C%','진행중','완료','대응'],W2=[13,8,7,8,7,8,7,8,9,9,9];
  ws2.columns=H2.map(function(h,i){return{header:'',key:'c'+(i+1),width:W2[i]};});
  var hRow2=ws2.getRow(1);hRow2.height=22;
  H2.forEach(function(h,i){var c=hRow2.getCell(i+1);c.value=h;c.font=fnt(true,10,'FFFFFFFF');c.fill=fill('000000');c.alignment=alg('center');c.border=hb();});
  var ri2=2;
  sortedYMs.forEach(function(ym){
    var mts=months[ym],tot=mts.length;
    function cnt(fn){return mts.filter(fn).length;}
