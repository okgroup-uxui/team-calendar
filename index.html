<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 공유 캘린더</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E24B4A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="팀 캘린더">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const firebaseConfig = {
    apiKey: "AIzaSyCwdQRsLvU7nPD7VacilCH6OypojQBOKF4",
    authDomain: "team-calendar-b52fa.firebaseapp.com",
    databaseURL: "https://team-calendar-b52fa-default-rtdb.firebaseio.com",
    projectId: "team-calendar-b52fa",
    storageBucket: "team-calendar-b52fa.firebasestorage.app",
    messagingSenderId: "974095358671",
    appId: "1:974095358671:web:8ecdc27650e75a38edb5ba"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  const tasksRef = ref(db, 'tasks');
  const attendRef = ref(db, 'attendance');

  // 인증 상태 감시
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // 로그인 상태
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'flex';
      window._currentUser = user;
      // 사용자 정보 표시
      var uname = user.displayName || user.email;
      var uphoto = user.photoURL;
      var uiEl = document.getElementById('user-info');
      if (uiEl) uiEl.innerHTML =
        (uphoto ? '<img src="'+uphoto+'" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">' : '')
        + '<span style="font-size:12px;color:var(--t2)">'+uname+'</span>'
        + '<button onclick="doSignOut()" style="font-size:11px;padding:3px 9px;border:0.5px solid var(--bd);border-radius:6px;background:none;cursor:pointer;color:var(--t2)">로그아웃</button>';
      // Firebase 리스너 시작
      onValue(tasksRef, (snap) => {
        window._tasks = snap.val() ? Object.values(snap.val()) : [];
        if (window._renderAll) window._renderAll();
        window._showStatus('🟢 ' + uname);
      }, (err) => window._showStatus('🔴 오류: ' + err.message));
      onValue(attendRef, (snap) => {
        window._attendance = snap.val() ? Object.values(snap.val()) : [];
        if (window._renderAll) window._renderAll();
      });
    } else {
      // 로그아웃 상태
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display = 'none';
      window._currentUser = null;
      window._showStatus('🔴 로그인 필요');
    }
  });

  window._fbSaveTasks = async (list) => { const o = {}; list.forEach(t => { o[t.id] = t; }); await set(tasksRef, o); };
  window._fbDelTask = async (id) => { await remove(ref(db, 'tasks/' + id)); };
  window._fbSaveAttend = async (list) => { const o = {}; list.forEach(a => { o[a.id] = a; }); await set(attendRef, o); };
  window._fbDelAttend = async (id) => { await remove(ref(db, 'attendance/' + id)); };
  window._showStatus('🟡 로딩 중...');

  window._doGoogleLogin = async () => {
    try {
      await signInWithPopup(auth, provider);
    } catch(e) {
      alert('로그인 실패: ' + e.message);
    }
  };
  window._doSignOut = async () => {
    await signOut(auth);
  };
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f8f7; color: #1a1a1a; font-size: 14px; display: flex; height: 100vh; overflow: hidden; }
:root {
  --ca: #E24B4A; --ca-bg: #FCEBEB; --ca-t: #791F1F;
  --cb: #BA7517; --cb-bg: #FAEEDA; --cb-t: #633806;
  --cc: #378ADD; --cc-bg: #E6F1FB; --cc-t: #0C447C;
  --todo: #888780; --todo-bg: #F1EFE8; --todo-t: #444441;
  --prog: #1D9E75; --prog-bg: #E1F5EE; --prog-t: #085041;
  --done: #534AB7; --done-bg: #EEEDFE; --done-t: #3C3489;
  --hold: #D85A30; --hold-bg: #FAECE7; --hold-t: #712B13;
  --open: #D4537E; --open-bg: #FBEAF0; --open-t: #72243E;
  --ata: #1a6fc4; --ata-bg: #ddeeff; --ata-t: #0a3d7a;
  --ath: #2e8fd6; --ath-bg: #e4f2fb; --ath-t: #124e7a;
  --atq: #5ba8e0; --atq-bg: #eef6fd; --atq-t: #1e5c8a;
  --bd: #e5e4e0; --bg: #fff; --bg2: #f8f8f7; --bg3: #f1efe8;
  --t: #1a1a1a; --t2: #6b6a66; --t3: #9b9a96; --sw: 220px;
}
/* ── Login Screen ── */

}

  background: #fff; border-radius: 16px; border: 0.5px solid var(--bd);

}
.login-logo { font-size: 36px; margin-bottom: 16px; }
.login-title { font-size: 20px; font-weight: 700; color: var(--t); margin-bottom: 6px; }

.google-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 12px 20px; border-radius: 10px;
  border: 1.5px solid var(--bd); background: #fff; cursor: pointer;
  font-size: 14px; font-weight: 600; color: var(--t);

}

/* ── Sidebar ── */
.sb { width: var(--sw); min-width: var(--sw); background: #f5f4f0; border-right: 0.5px solid var(--bd); display: flex; flex-direction: column; overflow: hidden; transition: width .2s, min-width .2s; flex-shrink: 0; height: 100%; }
.sb.hide { width: 0; min-width: 0; }
.sb-top { padding: 13px; border-bottom: 0.5px solid var(--bd); }
.sb-logo { font-size: 13px; font-weight: 700; color: var(--t); white-space: nowrap; }

.sb-sec-title { font-size: 10px; font-weight: 600; color: var(--t3); letter-spacing: .7px; margin-bottom: 7px; text-transform: uppercase; }

.sb-div { height: 0.5px; background: var(--bd); margin: 8px 13px; }
.mini { padding: 9px 13px 13px; }
.mini-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
.mini-t { font-size: 12px; font-weight: 600; color: var(--t); }
.mnb { background: none; border: none; cursor: pointer; font-size: 13px; color: var(--t2); padding: 1px 5px; border-radius: 4px; }
.mnb:hover { background: rgba(0,0,0,.08); }
.mgrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
.mdl { font-size: 9px; color: var(--t3); text-align: center; padding: 1px 0 3px; font-weight: 500; }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.sbtoggle { background: none; border: 0.5px solid var(--bd); border-radius: 6px; padding: 4px 7px; cursor: pointer; color: var(--t2); display: flex; align-items: center; }

.btn-task { background: #E24B4A; border: none; border-radius: 7px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: white; font-weight: 600; }
.btn-task:hover { background: #c03030; }
.btn-at { background: #1a6fc4; border: none; border-radius: 7px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: white; font-weight: 600; }
.btn-dl { background: none; border: 0.5px solid var(--bd); border-radius: 7px; padding: 5px 9px; font-size: 12px; cursor: pointer; color: var(--t2); display: flex; align-items: center; gap: 5px; }

/* ── Calendar ── */

.cgrid-wrap { position: relative; }
.cgrid-resizer { position: absolute; bottom: 0; left: 0; right: 0; height: 8px; cursor: ns-resize; z-index: 10; }
.cgrid-resizer::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background: var(--bd); border-radius: 2px; opacity: 0; transition: opacity .2s; }
.cgrid-resizer:hover::after { opacity: 1; }
.cgrid-resizer:hover { background: linear-gradient(to top, rgba(0,0,0,.04), transparent); }
.cell { background: #fff; min-height: var(--cell-h, 180px); padding: 4px 4px 3px; cursor: pointer; transition: background .1s; }

.cell.om { background: var(--bg3); }

.chip { font-size: 9px; padding: 1px 4px; border-radius: 3px; margin-bottom: 1px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 2px; line-height: 1.4; }

.odot { width: 6px; height: 6px; border-radius: 50%; background: var(--open); flex-shrink: 0; }

/* ── Modal ── */
.ov { position: fixed; inset: 0; background: rgba(0,0,0,.42); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; }
.mod { background: #fff; border-radius: 12px; border: 0.5px solid var(--bd); width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.15); }
.mhd { padding: 12px 16px 10px; border-bottom: 0.5px solid var(--bd); display: flex; align-items: center; justify-content: space-between; }
.mttl2 { font-size: 15px; font-weight: 600; color: var(--t); }
.mcls { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--t2); padding: 1px 6px; border-radius: 4px; }
.mcls:hover { background: var(--bg2); }
.mbdy { padding: 13px 16px; }
.fr { margin-bottom: 10px; }
.fl { font-size: 12px; color: var(--t2); margin-bottom: 3px; display: block; font-weight: 500; }
.req { color: var(--ca); }
.fi, .fs, .fta { width: 100%; padding: 7px 9px; border: 0.5px solid #d0cfc9; border-radius: 7px; font-size: 13px; font-family: inherit; background: #fff; color: var(--t); }
.fi:focus, .fs:focus, .fta:focus { outline: none; border-color: #378ADD; box-shadow: 0 0 0 2px rgba(55,138,221,.12); }
.fta { resize: vertical; min-height: 52px; }
.fr2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 10px; }
.tgrp { display: flex; gap: 4px; flex-wrap: wrap; }
.tbg { padding: 5px 11px; border: 0.5px solid #d0cfc9; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600; background: #fff; color: var(--t2); transition: all .15s; }
.tbg:hover { background: var(--bg2); }
.tbg.on-A { background: var(--ca-bg) !important; color: var(--ca-t) !important; border-color: var(--ca) !important; }
.tbg.on-B { background: var(--cb-bg) !important; color: var(--cb-t) !important; border-color: var(--cb) !important; }
.tbg.on-C { background: var(--cc-bg) !important; color: var(--cc-t) !important; border-color: var(--cc) !important; }
.tbg.on-todo { background: var(--todo-bg) !important; color: var(--todo-t) !important; border-color: var(--todo) !important; }
.tbg.on-prog { background: var(--prog-bg) !important; color: var(--prog-t) !important; border-color: var(--prog) !important; }
.tbg.on-done { background: var(--done-bg) !important; color: var(--done-t) !important; border-color: var(--done) !important; }
.tbg.on-hold { background: var(--hold-bg) !important; color: var(--hold-t) !important; border-color: var(--hold) !important; }
.tbg.on-at { background: var(--ata-bg) !important; color: var(--ata-t) !important; border-color: var(--ata) !important; }
.mft { padding: 10px 16px; border-top: 0.5px solid var(--bd); display: flex; justify-content: flex-end; gap: 6px; align-items: center; }
.bcnl { background: none; border: 0.5px solid #d0cfc9; border-radius: 7px; padding: 7px 14px; font-size: 13px; cursor: pointer; color: var(--t2); font-weight: 500; }
.bcnl:hover { background: var(--bg2); }
.bsav { background: #E24B4A; border: none; border-radius: 7px; padding: 7px 14px; font-size: 13px; cursor: pointer; color: white; font-weight: 600; }
.bsav:hover { background: #c03030; }
.bsav.blue { background: #1a6fc4; }
.bsav.blue:hover { background: #145aa0; }
.bdel { background: none; border: 1.5px solid var(--ca); border-radius: 7px; padding: 7px 12px; font-size: 13px; cursor: pointer; color: var(--ca); font-weight: 600; margin-right: auto; }
.bdel:hover { background: var(--ca-bg); }
.delbox { background: #fff0f0; border: 2px solid var(--ca); border-radius: 7px; padding: 14px; margin: 0 16px 14px; display: none; }
.deltit { font-size: 14px; font-weight: 700; color: var(--ca); margin-bottom: 4px; }
.deltit::before { content: "⚠️ "; }
.deldsc { font-size: 12px; color: var(--ca-t); margin-bottom: 11px; line-height: 1.5; }
.delbtn { display: flex; gap: 7px; }
.bdelno { flex: 1; background: #fff; border: 1.5px solid #d0cfc9; border-radius: 7px; padding: 9px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--t2); }
.bdelno:hover { background: var(--bg2); }
.bdelyes { flex: 2; background: var(--ca); border: none; border-radius: 7px; padding: 9px; font-size: 13px; font-weight: 700; cursor: pointer; color: white; }
.bdelyes:hover { background: #c03030; }
.dbadges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.dbadge { font-size: 11px; padding: 2px 7px; border-radius: 9px; font-weight: 600; }
.dr { display: flex; gap: 5px; margin-bottom: 6px; font-size: 13px; }
.dk { color: var(--t2); min-width: 74px; font-size: 12px; padding-top: 1px; }
.dv { color: var(--t); }
.dsb { display: flex; gap: 4px; flex-wrap: wrap; }
.dsbtn { padding: 4px 10px; border: 0.5px solid #d0cfc9; border-radius: 9px; cursor: pointer; font-size: 12px; background: #fff; color: var(--t2); font-weight: 500; }
.dsbtn.cur-todo { background: var(--todo-bg); color: var(--todo-t); border-color: var(--todo); font-weight: 600; }
.dsbtn.cur-prog { background: var(--prog-bg); color: var(--prog-t); border-color: var(--prog); font-weight: 600; }
.dsbtn.cur-done { background: var(--done-bg); color: var(--done-t); border-color: var(--done); font-weight: 600; }
.dsbtn.cur-hold { background: var(--hold-bg); color: var(--hold-t); border-color: var(--hold); font-weight: 600; }
/* ── Date Picker ── */
.dpw { position: relative; }
.dpi { width: 100%; padding: 7px 9px; border: 0.5px solid #d0cfc9; border-radius: 7px; font-size: 13px; background: #fff; color: var(--t); cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-family: inherit; }
.dpi.empty { color: var(--t3); }
.dpi:hover { border-color: #888; }
.dpp { position: absolute; top: calc(100% + 3px); left: 0; z-index: 999; background: #fff; border: 0.5px solid #d0cfc9; border-radius: 11px; padding: 9px; width: 232px; box-shadow: 0 4px 16px rgba(0,0,0,.1); }
.dpph { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
.dppm { font-size: 12px; font-weight: 600; color: var(--t); }
.dpnb { background: none; border: 0.5px solid #d0cfc9; border-radius: 5px; padding: 2px 7px; cursor: pointer; font-size: 11px; color: var(--t2); }
.dpnb:hover { background: var(--bg2); }
.dpg { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
.dpdl { font-size: 9px; color: var(--t3); text-align: center; padding: 2px 0 4px; font-weight: 500; }
.dpdl.sun { color: #E24B4A; }
.dpd { font-size: 11px; padding: 4px 1px; text-align: center; border-radius: 4px; cursor: pointer; color: var(--t); border: none; background: none; font-family: inherit; width: 100%; }
.dpd:hover { background: var(--bg2); }
.dpd.sel { background: #E24B4A; color: white; font-weight: 600; }
.dpd.tod { border: 1px solid #E24B4A; color: #E24B4A; }
.dpd.tod.sel { color: white; border-color: transparent; }
.dpd.om { color: var(--t3); }
.dpd.hol { color: #E24B4A; opacity: .45; pointer-events: none; }
.dpd.we { color: #aaa; opacity: .45; pointer-events: none; }
.dpclr { font-size: 10px; color: var(--t3); cursor: pointer; padding: 5px 0 1px; text-align: center; border-top: 0.5px solid var(--bd); margin-top: 5px; }
.dpclr:hover { color: var(--ca); }
/* ── Task Type Multi Select ── */
.tt-wrap { display: flex; flex-wrap: wrap; gap: 5px; padding: 6px 8px; border: 0.5px solid #d0cfc9; border-radius: 7px; min-height: 38px; cursor: pointer; background: #fff; }
.tt-wrap:focus-within { border-color: #378ADD; box-shadow: 0 0 0 2px rgba(55,138,221,.12); }
.tt-tag { display: inline-flex; align-items: center; gap: 4px; background: var(--cc-bg); color: var(--cc-t); border: 0.5px solid var(--cc); border-radius: 5px; font-size: 12px; padding: 2px 6px; font-weight: 600; }
.tt-tag-del { cursor: pointer; font-size: 13px; line-height: 1; color: var(--cc-t); opacity: .7; }
.tt-tag-del:hover { opacity: 1; }
.tt-placeholder { font-size: 13px; color: var(--t3); line-height: 1.8; }
.tt-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 0.5px solid #d0cfc9; border-radius: 7px; box-shadow: 0 4px 14px rgba(0,0,0,.1); z-index: 500; max-height: 200px; overflow-y: auto; margin-top: 2px; display: none; }
.tt-option { padding: 8px 10px; font-size: 13px; cursor: pointer; color: var(--t); border-bottom: 0.5px solid var(--bd); display: flex; align-items: center; gap: 8px; }
.tt-option:last-child { border-bottom: none; }
.tt-option:hover { background: var(--bg2); }
.tt-option.selected { background: var(--cc-bg); color: var(--cc-t); }
.tt-check { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid #bbb; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tt-check.on { background: var(--cc); border-color: var(--cc); }
.tt-check.on::after { content: ''; display: block; width: 8px; height: 6px; border-left: 2px solid white; border-bottom: 2px solid white; transform: rotate(-45deg) translate(1px, -1px); }
/* ── Autocomplete ── */
.ac-wrap { position: relative; }
.ac-list { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 0.5px solid #d0cfc9; border-radius: 7px; box-shadow: 0 4px 14px rgba(0,0,0,.1); z-index: 500; max-height: 180px; overflow-y: auto; margin-top: 2px; display: none; }
.ac-item { padding: 8px 10px; font-size: 13px; cursor: pointer; color: var(--t); border-bottom: 0.5px solid var(--bd); }
.ac-item:last-child { border-bottom: none; }
.ac-item:hover { background: var(--bg2); }
.ac-item em { color: var(--ca); font-style: normal; font-weight: 600; }
/* ── More popup ── */
.more-item { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 0.5px solid var(--bd); cursor: pointer; }
.more-item:last-child { border-bottom: none; }
.more-item:hover { background: var(--bg2); }
/* ── Toast ── */
.toast { position: fixed; bottom: 14px; right: 14px; background: #1a1a1a; color: #fff; font-size: 12px; padding: 6px 13px; border-radius: 18px; opacity: 0; transition: opacity .3s; z-index: 400; pointer-events: none; }
.toast.show { opacity: 1; }
/* ── List modal table ── */
.lmtbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.lmtbl th { font-size: 11px; font-weight: 600; color: var(--t2); text-align: left; padding: 6px 8px; border-bottom: 0.5px solid var(--bd); white-space: nowrap; background: var(--bg2); }
.lmtbl td { white-space: nowrap; }
.lmtbl .td-nm { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
.lmtbl td { padding: 6px 8px; border-bottom: 0.5px solid var(--bd); vertical-align: middle; white-space: nowrap; }
.lmtbl tr:last-child td { border-bottom: none; }
.lmtbl tr:hover td { background: var(--bg2); cursor: pointer; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
</head>
<body>

var AT_LABEL = {annual:'연차',half_am:'반차(오전)',half_pm:'반차(오후)',quarter_am:'반반차(오전)',quarter_pm:'반반차(오후)'};

var HOLS = {'01-01':'신정','03-01':'삼일절','05-05':'어린이날','06-06':'현충일','08-15':'광복절','10-03':'개천절','10-09':'한글날','12-25':'크리스마스','2024-02-09':'설날연휴','2024-02-10':'설날','2024-02-11':'설날연휴','2025-01-28':'설날연휴','2025-01-29':'설날','2025-01-30':'설날연휴','2026-02-16':'설날연휴','2026-02-17':'설날','2026-02-18':'설날연휴','2027-02-06':'설날연휴','2027-02-07':'설날','2027-02-08':'설날연휴','2024-09-16':'추석연휴','2024-09-17':'추석','2024-09-18':'추석연휴','2025-10-05':'추석연휴','2025-10-06':'추석','2025-10-07':'추석연휴','2026-09-24':'추석연휴','2026-09-25':'추석','2026-09-26':'추석연휴','2027-09-14':'추석연휴','2027-09-15':'추석','2027-09-16':'추석연휴','2024-05-15':'부처님오신날','2025-05-05':'부처님오신날','2026-05-24':'부처님오신날','2027-05-13':'부처님오신날','2024-04-10':'국회의원선거','2025-03-03':'삼일절대체','2025-05-06':'어린이날대체','2025-06-03':'대통령선거','2026-03-02':'삼일절대체','2026-08-17':'광복절대체'};

function hol(ds) { return HOLS[ds] || HOLS[ds.slice(5)] || null; }
function tds(d) { return d.getFullYear() + '-' + p2(d.getMonth()+1) + '-' + p2(d.getDate()); }
function p2(n) { return String(n).padStart(2,'0'); }
function dlabel(n) { return n ? n.slice(0,2) : ''; }
function isWE(d) { var w = d.getDay(); return w === 0 || w === 6; }
function gid() { return Date.now() + Math.random().toString(36).slice(2); }

function bizDays(s, e) {
  if (!s || !e) return 0;
  var sd = new Date(s + 'T00:00:00'), ed = new Date(e + 'T00:00:00');
  if (sd > ed) return 0;
  var cnt = 0, cur = new Date(sd);
  while (cur <= ed) {
    if (cur.getDay() !== 0 && cur.getDay() !== 6 && !hol(tds(cur))) cnt++;
    cur.setDate(cur.getDate() + 1);
  }
  return cnt;
}

// ── 셀 높이 리사이즈 (하단 경계선 드래그) ──
(function() {
  var isResizing = false, startY = 0, startH = 180;
  function getCellH() {
    var v = getComputedStyle(document.documentElement).getPropertyValue('--cell-h');
    return parseInt(v) || 150;
  }
  function setCellH(h) {
    h = Math.max(80, Math.min(400, h));
    document.documentElement.style.setProperty('--cell-h', h + 'px');
    // 높이 변경 시 캘린더 재렌더 (MAX_SHOW 재계산)
    if (typeof renderCal === 'function') renderCal();
  }
  function initResize() {
    var resizer = document.getElementById('cgrid-resizer');
    if (!resizer) return;
    resizer.addEventListener('mousedown', function(e) {
      isResizing = true;
      startY = e.clientY;
      startH = getCellH();
      document.body.style.cursor = 'ns-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
      if (!isResizing) return;
      var delta = e.clientY - startY;
      setCellH(startH + delta);
    });
    document.addEventListener('mouseup', function() {
      if (isResizing) {
        isResizing = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      }
    });
    resizer.addEventListener('touchstart', function(e) {
      isResizing = true;
      startY = e.touches[0].clientY;
      startH = getCellH();
      e.preventDefault();
    }, {passive:false});
    document.addEventListener('touchmove', function(e) {
      if (!isResizing) return;
      setCellH(startH + (e.touches[0].clientY - startY));
    }, {passive:true});
    document.addEventListener('touchend', function() { isResizing = false; });
  }
  document.addEventListener('DOMContentLoaded', initResize);
  setTimeout(initResize, 200);
})();

function getMonthTasks() {
  return tasks.filter(function(t) {
    if (!t.startDate || !t.endDate) return false;
    var s = new Date(t.startDate + 'T00:00:00'), e = new Date(t.endDate + 'T00:00:00');
    return s <= new Date(CY, CM+1, 0) && e >= new Date(CY, CM, 1);
  });
}
// 같은 업무명은 1건으로 병합 (기간: min~max, 영업일: 합계)
function getMonthTasksUniq() {
  var all = getMonthTasks();
  var map = {};
  for (var i = 0; i < all.length; i++) {
    var t = all[i];
    var key = (t.taskName || '').trim();
    if (!map[key]) {
      map[key] = {
        id: t.id, taskName: t.taskName, taskType: t.taskType||'', taskTypes: t.taskTypes||[], dept: t.dept, customDept: t.customDept,
        grade: t.grade, designer: t.designer, status: t.status,
        draftDate: t.draftDate, openDate: t.openDate, memo: t.memo,
        startDate: t.startDate, endDate: t.endDate,
        totalBizDays: bizDays(t.startDate, t.endDate)
      };
    } else {
      var m = map[key];
      if (t.startDate && (!m.startDate || t.startDate < m.startDate)) m.startDate = t.startDate;
      if (t.endDate && (!m.endDate || t.endDate > m.endDate)) m.endDate = t.endDate;
      m.totalBizDays = (m.totalBizDays || 0) + bizDays(t.startDate, t.endDate);
    }
  }
  return Object.values(map);
}
function getMonthAttend() {

function renderCal() {
  var grid = document.getElementById('cgrid');
  var ts = tds(new Date());
  var start = new Date(CY,CM,1);
  var dow = start.getDay();
  start.setDate(start.getDate() + (dow===0 ? -6 : -(dow-1)));
  var end = new Date(CY,CM+1,0);
  while (end.getDay() !== 5) end.setDate(end.getDate()+1);
  var cells = [], cur = new Date(start);
  while (cur <= end) {
    if (cur.getDay()!==0 && cur.getDay()!==6) {
      var ds = tds(cur), hn = hol(ds);
      cells.push({date:new Date(cur), ds:ds, om:cur.getMonth()!==CM, tod:ds===ts, hn:hn});
    }
    cur.setDate(cur.getDate()+1);
  }
  var html = '';
  for (var i = 0; i < cells.length; i++) {
    var cell = cells[i];
    var date = cell.date, ds = cell.ds, om = cell.om, tod = cell.tod, hn = cell.hn;
    var cls = 'cell' + (om?' om':'') + (tod?' tod':'') + (hn?' hol':'');

    // 근태 인라인 태그
    var atTags = '';
    if (showAttend && !hn) {
      for (var ai = 0; ai < attendance.length; ai++) {
        var a = attendance[ai];
        if (a.date === ds) {
          var sh = AT_SHORT[a.atType] || '';
          var ac = a.atType || 'annual';
          atTags += '<span class="at-tag ' + ac + '" onclick="openDetailAttend(\'' + a.id + '\',event)">' + (a.name||'?') + ' ' + sh + '</span>';
        }
      }
    }

    // 업무 칩 수집
    var allItems = [];
    if (showTask && !hn) {
      var dDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      for (var ti = 0; ti < tasks.length; ti++) {
        var t = tasks[ti];
        if (t.openDate === ds) allItems.push({type:'o', t:t});
      }
      for (var ti2 = 0; ti2 < tasks.length; ti2++) {
        var t2 = tasks[ti2];
        if (!t2.startDate || !t2.endDate) continue;
        var s2 = new Date(t2.startDate+'T00:00:00'), e2 = new Date(t2.endDate+'T00:00:00');
        if (dDate >= s2 && dDate <= e2) allItems.push({type:'p', t:t2});
      }
    }
    var chips = '';
    // 셀 높이 기반으로 최대 표시 개수 동적 계산
    // drow(22px) + 각 chip(약 18px) 기준, 패딩 등 고려
    var cellH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-h')) || 150;
    var CHIP_H = 18; // chip 한 줄 높이(px)
    var DROW_H = 24; // 날짜 행 높이
    var PAD = 10;    // 상하 패딩
    var MAX_SHOW = Math.max(1, Math.floor((cellH - DROW_H - PAD) / CHIP_H));
    for (var ci = 0; ci < Math.min(MAX_SHOW, allItems.length); ci++) {
      var item = allItems[ci];
      if (item.type === 'o') {
        var lbl = dlabel(item.t.designer);
        chips += '<div class="omk" onclick="openDetail(\'' + item.t.id + '\',event)"><span class="odot"></span>' + (lbl ? lbl+' · ' : '') + (item.t.taskName||'오픈') + '</div>';
      } else {
        var lbl2 = dlabel(item.t.designer);
        chips += '<div class="chip status-' + item.t.status + '" onclick="openDetail(\'' + item.t.id + '\',event)">' + (lbl2 ? '<span class="cdsgn">'+lbl2+'</span>' : '') + '<span class="cname">' + (item.t.taskName||'(업무명)') + '</span></div>';
      }
    }
    if (allItems.length > MAX_SHOW) {
      var remain = allItems.length - MAX_SHOW;
      var allIds = allItems.map(function(it) { return it.t.id; }).join(',');
      chips += '<div class="more-btn" onclick="showMoreTasks(\'' + ds + '\',\'' + allIds + '\')">+' + remain + '건 더 보기</div>';
    }

    html += '<div class="' + cls + '" ondblclick="' + (hn ? '' : 'openAdd(\''+ds+'\')') + '">'
      + '<div class="drow"><span class="dnum">' + date.getDate() + '</span>'
      + (hn ? '<span class="hname">' + hn + '</span>' : atTags)
      + '</div>'
      + (hn ? '<div style="font-size:9px;color:#E24B4A;opacity:.6;padding:1px 2px">휴일</div>' : chips)
      + '</div>';
  }
  grid.innerHTML = html;
}

function togglePicker(id, inclWE) {
  var pop = document.getElementById('dpp-'+id);
  if (!pop) return;
  var isOpen = pop.style.display !== 'none';
  document.querySelectorAll('.dpp').forEach(function(p) { p.style.display='none'; });
  if (!isOpen) {
    var v = document.getElementById('dph-'+id).value;
    var pY=CY, pM=CM;
    if (v) { var d2=new Date(v+'T00:00:00'); pY=d2.getFullYear(); pM=d2.getMonth(); }
    renderPP(id, pY, pM, inclWE);
    pop.style.display = 'block';
    activePicker = {id:id, inclWE:inclWE};
  } else { activePicker = null; }
}
function renderPP(id, pY, pM, inclWE) {
  var pop = document.getElementById('dpp-'+id);
  if (!pop) return;
  var sel = document.getElementById('dph-'+id).value;
  var ts = tds(new Date());
  var fdow = new Date(pY,pM,1).getDay(), dim = new Date(pY,pM+1,0).getDate();
  var days = ['일','월','화','수','목','금','토'];
  var g = days.map(function(d,i){return '<div class="dpdl'+(i===0?' sun':'')+'">'+d+'</div>';}).join('');
  for (var i=0;i<fdow;i++) g += '<div class="dpd om"></div>';
  for (var d=1;d<=dim;d++) {
    var dt=new Date(pY,pM,d), ds=tds(dt);
    var isH=!!hol(ds), isWe=isWE(dt), isSel=ds===sel, isTod=ds===ts;
    var cls='dpd'+(isTod?' tod':'')+(isSel?' sel':'')+(isH?' hol':'')+((!inclWE&&isWe&&!isH)?' we':'');
    var act=(isH||(!inclWE&&isWe))?'':'onclick="pickDate(\''+id+'\',\''+ds+'\')"';
    g += '<button type="button" class="'+cls+'" '+act+'>'+d+'</button>';
  }
  pop.innerHTML = '<div class="dpph">'
    + '<button class="dpnb" onclick="pickerNav(\''+id+'\','+pY+','+pM+',-1,'+inclWE+')">&#8249;</button>'
    + '<span class="dppm">'+pY+'년 '+(pM+1)+'월</span>'
    + '<button class="dpnb" onclick="pickerNav(\''+id+'\','+pY+','+pM+',1,'+inclWE+')">&#8250;</button>'
    + '</div><div class="dpg">'+g+'</div>'
    + '<div class="dpclr" onclick="pickDate(\''+id+'\',\'\')">지우기</div>';
}
function pickerNav(id,y,m,dir,inclWE){m+=dir;if(m>11){m=0;y++;}if(m<0){m=11;y--;}renderPP(id,y,m,inclWE);}
function pickDate(id,ds){
  document.getElementById('dph-'+id).value=ds;
  document.getElementById('dpv-'+id).textContent=ds||'날짜 선택';
  var btn=document.querySelector('#dpw-'+id+' .dpi');
  if(btn) btn.className='dpi'+(ds?'':' empty');
  document.getElementById('dpp-'+id).style.display='none';
  activePicker=null;
}
document.addEventListener('click',function(e){
  if (activePicker && !e.target.closest('.dpw')) {
    document.querySelectorAll('.dpp').forEach(function(p){p.style.display='none';});
    activePicker=null;
  }
},true);

function closeTTDropdown() {

}
function toggleTT(val) {
  var idx = selectedTaskTypes.indexOf(val);
  if (idx >= 0) selectedTaskTypes.splice(idx, 1);
  else selectedTaskTypes.push(val);
  refreshTTWrap();
}
function removeTT(e, val) {
  e.stopPropagation();
  var idx = selectedTaskTypes.indexOf(val);
  if (idx >= 0) selectedTaskTypes.splice(idx, 1);
  refreshTTWrap();
}
function refreshTTWrap() {
  var wrap = document.getElementById('tt-wrap');
  var dd = document.getElementById('tt-dropdown');
  if (!wrap) return;
  if (selectedTaskTypes.length === 0) {
    wrap.innerHTML = '<span class="tt-placeholder">종류 선택 (중복 가능)</span>';
  } else {
    wrap.innerHTML = selectedTaskTypes.map(function(v) {
      return '<span class="tt-tag">'+v+'<span class="tt-tag-del" data-del="'+v+'">&#215;</span></span>';
    }).join('');
  }
  if (dd) {
    dd.innerHTML = TASK_TYPES.map(function(tt) {
      var sel = selectedTaskTypes.indexOf(tt) >= 0;
      return '<div class="tt-option'+(sel?' selected':'')+'" data-val="'+tt+'">'
        +'<div class="tt-check'+(sel?' on':'')+'"></div>'+tt+'</div>';
    }).join('')
    + '<div style="padding:7px 10px;border-top:0.5px solid var(--bd);display:flex;justify-content:flex-end">'
    + '<button type="button" data-role="tt-close" style="font-size:12px;padding:4px 12px;background:#1a1a1a;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600">선택 완료</button>'
    + '</div>';
  }
}
// 이벤트 위임 — 모달 내 클릭 처리
document.addEventListener('click', function(e) {
  // tt-close 버튼
  if (e.target.closest('[data-role="tt-close"]')) {
    closeTTDropdown();
    return;
  }
  // tt-tag 삭제 버튼
  var delBtn = e.target.closest('[data-del]');
  if (delBtn) {
    var val = delBtn.getAttribute('data-del');
    var idx = selectedTaskTypes.indexOf(val);
    if (idx >= 0) selectedTaskTypes.splice(idx, 1);
    refreshTTWrap();
    return;
  }
  // tt-option 클릭
  var opt = e.target.closest('[data-val]');
  if (opt && opt.classList.contains('tt-option')) {
    var val = opt.getAttribute('data-val');
    var idx = selectedTaskTypes.indexOf(val);
    if (idx >= 0) selectedTaskTypes.splice(idx, 1);
    else selectedTaskTypes.push(val);
    refreshTTWrap();
    return;  // 드롭다운 닫지 않음!
  }
  // tt-wrap 클릭 (태그/옵션 제외) → 드롭다운 열기/닫기
  var wrap = e.target.closest('[data-role="tt-wrap"]');
  if (wrap) {
    var dd = document.getElementById('tt-dropdown');
    if (dd) dd.style.display = dd.style.display === 'block' ? 'none' : 'block';
    return;
  }
  // 외부 클릭 → 드롭다운 닫기
  if (!e.target.closest('#tt-dropdown')) {
    closeTTDropdown();
  }
});

  document.getElementById('mroot').innerHTML='<div class="ov" onclick="if(event.target===this)closeMod()">'
    +'<div class="mod"><div class="mhd"><span class="mttl2">'+(editId?'업무 수정':'업무 추가')+'</span><button class="mcls" onclick="closeMod()">&#215;</button></div>'
    +'<div class="mbdy">'
    // 업무명 + 자동완성
    +'<div class="fr ac-wrap"><label class="fl">업무명 <span class="req">*</span></label>'

    +'<div class="ac-list" id="ac-list"></div></div>'
    +'<div class="fr"><label class="fl">업무 종류 <span class="req">*</span></label>'
    +'<div class="ac-wrap" style="position:relative">'
    +'<div class="tt-wrap" id="tt-wrap" data-role="tt-wrap">'
    + (function(){ var sel=selectedTaskTypes; return sel.length===0 ? '<span class="tt-placeholder">종류 선택 (중복 가능)</span>' : sel.map(function(v){return '<span class="tt-tag">'+v+'<span class="tt-tag-del" onclick="removeTT(event,&quot;'+v+'&quot;)">&#215;</span></span>';}).join(''); })()
    +'</div>'
    +'<div class="tt-dropdown" id="tt-dropdown">'
    +TASK_TYPES.map(function(tt){ var sel=selectedTaskTypes.indexOf(tt)>=0; return '<div class="tt-option'+(sel?' selected':'')+'" data-val="'+tt+'">'+'<div class="tt-check'+(sel?' on':'')+'"></div>'+tt+'</div>'; }).join('')
    +'<div style="padding:7px 10px;border-top:0.5px solid var(--bd);display:flex;justify-content:flex-end"><button type="button" data-role="tt-close" style="font-size:12px;padding:4px 12px;background:#1a1a1a;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600">선택 완료</button></div>'
    +'</div>'
    +'</div></div>'
    +'<div class="fr2"><div><label class="fl">요청부서 <span class="req">*</span></label><select class="fs" id="f-dept" onchange="togCust()"><option value="">부서 선택</option>'+dOpts+'</select></div>'
    +'<div>'+makePicker('draftDate','기안날짜',data.draftDate,false)+'</div></div>'
    +'<div class="fr" id="cust-row" style="display:'+(data.dept==='기타'?'block':'none')+'"><label class="fl">부서명 직접 입력</label><input class="fi" id="f-cdept" value="'+(data.customDept||'')+'" placeholder="부서명 입력"></div>'
    +'<div class="fr"><label class="fl">등급</label><div class="tgrp" id="g-grp">'+gH+'</div><input type="hidden" id="f-grade" value="'+(data.grade||'B')+'"></div>'
    +'<div class="fr"><label class="fl">디자인 담당자</label><select class="fs" id="f-designer">'+dgnOpts+'</select></div>'
    +'<div class="fr2"><div>'+makePicker('startDate','업무 시작일 *',data.startDate,false)+'</div><div>'+makePicker('endDate','업무 종료일 *',data.endDate,false)+'</div></div>'
    +'<div class="fr">'+makePicker('openDate','오픈날짜 (선택)',data.openDate,false)+'</div>'
    +'<div class="fr"><label class="fl">진행상황</label><div class="tgrp" id="s-grp">'+sH+'</div><input type="hidden" id="f-status" value="'+(data.status||'todo')+'"></div>'
    +'<div class="fr"><label class="fl">메모</label><textarea class="fta" id="f-memo" placeholder="메모를 입력하세요">'+(data.memo||'')+'</textarea></div>'
    +'</div>'
    +(editId?delConfirmHTML(editId,'task'):'')
    +'<div class="mft">'+(editId?'<button class="bdel" onclick="showDel(\''+editId+'\')">삭제</button>':'')

    +'</div></div></div>';
}

function exportExcel() {
  if (typeof ExcelJS === 'undefined') { showToast('라이브러리 로딩 중... 잠시 후 다시 시도해주세요'); return; }
  var btn = document.querySelector('.btn-dl');
  if (btn) { btn.innerHTML = '⏳ 생성중...'; btn.disabled = true; }

  var exportTasks = tasks.filter(function(t){ return t.startDate && t.endDate; });

  // 스타일 상수
  var BLACK = 'FF000000', WHITE = 'FFFFFFFF';
  var FONT_NAME = '맑은 고딕';

  function fnt(bold, sz, argb) {
    return { name: FONT_NAME, bold: !!bold, size: sz||10, color: { argb: argb||'FF000000' } };
  }
  function fill(hex6) {
    return { type:'pattern', pattern:'solid', fgColor:{ argb:'FF'+hex6 } };
  }
  function align(h, v, wrap) {
    return { horizontal: h||'left', vertical: v||'middle', wrapText: wrap!==false };
  }
  var thinLine  = { style:'thin',   color:{ argb:'FFBBBBBB' } };
  var hairLine  = { style:'hair',   color:{ argb:'FFAAAAAA' } };
  var medLine   = { style:'medium', color:{ argb:'FF000000' } };

  function ib() { return { left:thinLine, right:thinLine, top:hairLine, bottom:hairLine }; }
  function hb() { return { left:thinLine, right:thinLine, top:medLine,  bottom:medLine  }; }

  function applyOuter(ws, r1, c1, r2, c2) {
    for (var r=r1; r<=r2; r++) {
      for (var c=c1; c<=c2; c++) {
        var cell = ws.getCell(r, c);
        var b = cell.border ? JSON.parse(JSON.stringify(cell.border)) : {};
        if (r===r1) b.top    = medLine;
        if (r===r2) b.bottom = medLine;
        if (c===c1) b.left   = medLine;
        if (c===c2) b.right  = medLine;
        cell.border = b;
      }
    }
  }

  var SMAP2 = {prog:'진행중', done:'완료', hold:'대응'};
  var GMAP2 = {A:'A', B:'B', C:'C'};

  function bizDaysEx(s, e) {
    if (!s||!e) return 0;
    var sd=new Date(s+'T00:00:00'), ed=new Date(e+'T00:00:00');
    if (sd>ed) return 0;
    var cnt=0, cur=new Date(sd);
    while(cur<=ed){if(cur.getDay()!==0&&cur.getDay()!==6&&!hol(tds(cur)))cnt++;cur.setDate(cur.getDate()+1);}
    return cnt;
  }

  var wb = new ExcelJS.Workbook();
  wb.creator = '팀 캘린더';

  // ── 월별 그룹핑 ──
  var months = {};
  exportTasks.forEach(function(t){
    var ym = t.startDate.slice(0,7);
    if (!months[ym]) months[ym]=[];
    months[ym].push(t);
  });
  var sortedYMs = Object.keys(months).sort();

  // ══ 시트1: 업무목록 ══
  var ws1 = wb.addWorksheet('업무목록', {
    views: [{state:'frozen', xSplit:0, ySplit:1, showGridLines:false}]
  });
  ws1.properties.defaultRowHeight = 18;

  var H1 = ['등급','업무종류','업무명','요청부서','담당자','기안일','시작일','종료일','영업일','진행상황','메모'];
  var W1 = [6,14,32,14,9,11,11,11,8,10,26];
  ws1.columns = H1.map(function(h,i){ return {header:'', key:'c'+(i+1), width:W1[i]}; });

  // 헤더 행
  var hdrRow = ws1.getRow(1);
  hdrRow.height = 22;
  H1.forEach(function(h, i) {
    var cell = hdrRow.getCell(i+1);
    cell.value = h;
    cell.font = fnt(true, 10, 'FFFFFFFF');
    cell.fill = fill('000000');
    cell.alignment = align('center');
    cell.border = hb();
  });
  ws1.autoFilter = { from:'A1', to:'K1' };

  var ri = 2;
  sortedYMs.forEach(function(ym) {
    // 월 구분 행
    var mRow = ws1.getRow(ri);
    mRow.height = 18;
    var mc = mRow.getCell(1);
    mc.value = ym.replace('-','년 ')+'월';
    mc.font = fnt(true, 10, 'FF1A3A5C');
    mc.fill = fill('D6E4F0');
    mc.alignment = align('left');
    mc.border = { left:medLine, right:thinLine, top:medLine, bottom:thinLine };
    for (var c=2; c<=11; c++) {
      var cc = mRow.getCell(c);
      cc.fill = fill('D6E4F0');
      cc.border = { left:thinLine, right:(c===11?medLine:thinLine), top:medLine, bottom:thinLine };
    }
    ws1.mergeCells(ri, 1, ri, 11);
    ri++;

    var mts = months[ym].slice().sort(function(a,b){return a.startDate>b.startDate?1:-1;});
    mts.forEach(function(t) {
      var dl = (t.dept==='기타'&&t.customDept) ? t.customDept : (t.dept||'');
      var gc = t.grade==='A'?'FADADB': t.grade==='B'?'FEF3D0': t.grade==='C'?'D6EAF8': 'FFFFFF';
      var sc = t.status==='prog'?'D6EAF8': t.status==='done'?'D5F5E3': t.status==='hold'?'FDEBD0': 'FFFFFF';
      var rowVals = [
        GMAP2[t.grade]||t.grade||'',
        t.taskType||'',
        t.taskName||'',
        dl,
        t.designer||'',
        t.draftDate||'',
        t.startDate||'',
        t.endDate||'',
        bizDaysEx(t.startDate, t.endDate),
        SMAP2[t.status]||t.status||'',
        t.memo||''
      ];
      var dRow = ws1.getRow(ri);
      rowVals.forEach(function(val, ci) {
        var cell = dRow.getCell(ci+1);
        cell.value = val;
        cell.font = fnt(ci===0, 10);
        cell.alignment = align([0,1,3,4,5,6,7,8,9].indexOf(ci)>=0 ? 'center':'left');
        cell.border = ib();
        cell.fill = ci===0 ? fill(gc) : ci===9 ? fill(sc) : fill('FFFFFF');
      });
      ri++;
    });
  });
  applyOuter(ws1, 1, 1, ri-1, 11);

  // ══ 시트2: 월별통계 ══
  var ws2 = wb.addWorksheet('월별통계', {views:[{showGridLines:false}]});
  var H2 = ['월','전체','A','A%','B','B%','C','C%','진행중','완료','대응'];
  var W2 = [13,8,7,8,7,8,7,8,9,9,9];
  ws2.columns = H2.map(function(h,i){ return {header:'', key:'c'+(i+1), width:W2[i]}; });
  var hRow2 = ws2.getRow(1);
  hRow2.height = 22;
  H2.forEach(function(h,i){
    var cell=hRow2.getCell(i+1);
    cell.value=h; cell.font=fnt(true,10,'FFFFFFFF'); cell.fill=fill('000000');
    cell.alignment=align('center'); cell.border=hb();
  });
  var ri2=2;
  sortedYMs.forEach(function(ym){
    var mts=months[ym], tot=mts.length;
    var cA=mts.filter(function(t){return t.grade==='A';}).length;
    var cB=mts.filter(function(t){return t.grade==='B';}).length;
    var cC=mts.filter(function(t){return t.grade==='C';}).length;
    var cP=mts.filter(function(t){return t.status==='prog';}).length;
    var cD=mts.filter(function(t){return t.status==='done';}).length;
    var cH=mts.filter(function(t){return t.status==='hold';}).length;
    function pct(n){return tot>0?Math.round(n/tot*100)+'%':'-';}
    var vals=[ym.replace('-','년 ')+'월',tot,cA,pct(cA),cB,pct(cB),cC,pct(cC),cP,cD,cH];
    var scs=[null,null,'FADADB','FADADB','FEF3D0','FEF3D0','D6EAF8','D6EAF8','D6EAF8','D5F5E3','FDEBD0'];
    var dRow=ws2.getRow(ri2);
    vals.forEach(function(val,ci){
      var cell=dRow.getCell(ci+1);
      cell.value=val; cell.font=fnt(ci<2); cell.border=ib();
      cell.alignment=align(ci>0?'center':'left');
      cell.fill=scs[ci]?fill(scs[ci]):fill('FFFFFF');
    });
    ri2++;
  });
  applyOuter(ws2,1,1,ri2-1,11);

  // ══ 시트3: 연간통계 ══
  var ws3 = wb.addWorksheet('연간통계', {views:[{showGridLines:false}]});
  var H3=['연도','총건수','월평균','A','A%','B','B%','C','C%','진행중','완료','대응','총영업일'];
  var W3=[9,8,9,7,8,7,8,7,8,9,9,9,10];
  ws3.columns=H3.map(function(h,i){return{header:'',key:'c'+(i+1),width:W3[i]};});
  var hRow3=ws3.getRow(1); hRow3.height=22;
  H3.forEach(function(h,i){
    var cell=hRow3.getCell(i+1);
    cell.value=h; cell.font=fnt(true,10,'FFFFFFFF'); cell.fill=fill('000000');
    cell.alignment=align('center'); cell.border=hb();
  });
  var years={};
  exportTasks.forEach(function(t){
    var y=t.startDate?t.startDate.slice(0,4):'미정'; years[y]=years[y]||[]; years[y].push(t);
  });
  var ri3=2;
  Object.keys(years).sort().forEach(function(y){
    var yts=years[y], tot=yts.length;
    var yms={}; yts.forEach(function(t){if(t.startDate)yms[t.startDate.slice(0,7)]=1;});
    var mCnt=Object.keys(yms).length||1;
    var cA=yts.filter(function(t){return t.grade==='A';}).length;
    var cB=yts.filter(function(t){return t.grade==='B';}).length;
    var cC=yts.filter(function(t){return t.grade==='C';}).length;
    var cP=yts.filter(function(t){return t.status==='prog';}).length;
    var cD=yts.filter(function(t){return t.status==='done';}).length;
    var cH=yts.filter(function(t){return t.status==='hold';}).length;
    var tBiz=yts.reduce(function(a,t){return a+bizDaysEx(t.startDate,t.endDate);},0);
    function pct(n){return tot>0?Math.round(n/tot*100)+'%':'-';}
    var vals=[y+'년',tot,(tot/mCnt).toFixed(1)+'건',cA,pct(cA),cB,pct(cB),cC,pct(cC),cP,cD,cH,tBiz];
    var scs=[null,null,null,'FADADB','FADADB','FEF3D0','FEF3D0','D6EAF8','D6EAF8','D6EAF8','D5F5E3','FDEBD0',null];
    var dRow=ws3.getRow(ri3);
    vals.forEach(function(val,ci){
      var cell=dRow.getCell(ci+1);
      cell.value=val; cell.font=fnt(ci<3,ci<2?11:10); cell.border=ib();
      cell.alignment=align(ci>0?'center':'left');
      cell.fill=scs[ci]?fill(scs[ci]):fill('FFFFFF');
    });
    ri3++;
  });
  applyOuter(ws3,1,1,ri3-1,13);

  // 다운로드
  wb.xlsx.writeBuffer().then(function(buf){
    var blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    var now=new Date();
    a.href=url; a.download='팀캘린더_'+now.getFullYear()+p2(now.getMonth()+1)+'.xlsx';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('엑셀 다운로드 완료! ✓');
    if(btn){btn.innerHTML='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M5 7l3 3 3-3"/><line x1="2" y1="13" x2="14" y2="13"/></svg>엑셀';btn.disabled=false;}
  }).catch(function(e){
    showToast('오류: '+e.message);
    if(btn){btn.innerHTML='엑셀';btn.disabled=false;}
  });
}
